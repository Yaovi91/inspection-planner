<style>
:root {
  --bg-base: #060708;
  --bg-card: #121418;
  --bg-card2: #1a1d23;
  --bg-input: #0d0f12;
  --bg-header: #0c0e11ee;
  --border: #333842;
  --border2: #454b57;
  --text: #f4f6fa;
  --text2: #e9ebef;
  --text3: #d6dae0;
  --accent: #2563eb;
  --accent-glow: rgba(37,99,235,0.18);
  --font-body: 'Inter', system-ui, sans-serif;
  --font-mono: 'JetBrains Mono', 'Courier New', monospace;
  --radius: 12px;
  --radius-sm: 8px;
  --shadow: 0 4px 24px rgba(0,0,0,0.5);
  --shadow-sm: 0 2px 8px rgba(0,0,0,0.4);
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html{font-size:15px;}
body{
  margin:0;padding:0;
  background:var(--bg-base);
  overscroll-behavior:none;
  font-family:var(--font-body);
  color:var(--text);
  -webkit-font-smoothing:antialiased;
  background-attachment:fixed;
}
input,select,textarea,button{font-family:var(--font-body);}
input,select,textarea{
  background:var(--bg-input) !important;
  border:1px solid var(--border) !important;
  color:var(--text) !important;
  border-radius:var(--radius-sm) !important;
  transition:border-color 0.2s;
}
input:focus,select:focus,textarea:focus{
  outline:none;
  border-color:var(--accent) !important;
  box-shadow:0 0 0 3px var(--accent-glow);
}
button{transition:all 0.15s ease;active-scale:0.97;}
button:active{transform:scale(0.97);}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:2px;}
#loading{
  position:fixed;inset:0;
  background:var(--bg-base);
  display:flex;flex-direction:column;
  align-items:center;justify-content:center;
  z-index:9999;
}
.ld-title{
  font-size:22px;font-weight:700;
  letter-spacing:6px;
  color:#3b82f6;
  font-family:var(--font-mono);
  margin-bottom:6px;
}
.ld-sub{font-size:11px;color:var(--text3);font-family:var(--font-mono);letter-spacing:2px;}
@keyframes spin{to{transform:rotate(360deg)}}
.ld-spinner{
  width:28px;height:28px;
  border:2px solid var(--border);
  border-top-color:#3b82f6;
  border-radius:50%;
  animation:spin 0.8s linear infinite;
  margin-top:16px;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
.card-enter{animation:fadeIn 0.2s ease forwards;}
@keyframes tabFade{from{opacity:0;transform:translateX(10px)}to{opacity:1;transform:translateX(0)}}
.tab-content-enter{animation:tabFade 0.24s cubic-bezier(0.32,0.72,0,1) forwards;}
@media (prefers-reduced-motion:reduce){.tab-content-enter{animation:none}}

/* Sync pulse */
@keyframes ispkPulse{0%,100%{opacity:1}50%{opacity:.5}}
.ispk-syncing{animation:ispkPulse 1.2s ease-in-out infinite;}

/* Smoother button press */
button:active{transform:scale(0.94);transition:transform .05s ease-out;}
button{transition:transform .12s ease, background .18s ease, border-color .18s ease, color .18s ease, box-shadow .18s ease;}

/* Modal slide-up animation */
@keyframes ispkSlideUp{from{transform:translateY(8%);opacity:0}60%{transform:translateY(-0.5%)}to{transform:translateY(0);opacity:1}}
@keyframes ispkBackdrop{from{opacity:0;backdrop-filter:blur(0px);-webkit-backdrop-filter:blur(0px)}to{opacity:1;backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px)}}
@media (prefers-reduced-motion:reduce){
  @keyframes ispkSlideUp{from{opacity:0}to{opacity:1}}
}

/* Toast */
@keyframes ispkToastIn{from{transform:translate(-50%,40px) scale(.95);opacity:0}to{transform:translate(-50%,0) scale(1);opacity:1}}
@keyframes ispkToastOut{from{transform:translate(-50%,0) scale(1);opacity:1}to{transform:translate(-50%,30px) scale(.95);opacity:0}}
.ispk-toast{
  position:fixed;left:50%;bottom:max(32px,env(safe-area-inset-bottom,16px));
  transform:translateX(-50%);
  background:#1a1d23;color:#f4f6fa;
  padding:11px 18px;border-radius:12px;
  font-family:var(--font-mono);font-size:13px;font-weight:600;
  border:1px solid var(--border2);
  box-shadow:0 12px 32px rgba(0,0,0,0.5),0 0 0 1px rgba(255,255,255,0.04);
  z-index:9999;letter-spacing:.3px;white-space:nowrap;
  animation:ispkToastIn .25s cubic-bezier(0.32,0.72,0,1);
  pointer-events:none;
}
.ispk-toast.out{animation:ispkToastOut .2s forwards}
.ispk-toast.ok{border-color:#22c55e44;color:#86efac}
.ispk-toast.err{border-color:#ef444444;color:#fca5a5}

/* Fix select option visibility on Chrome Windows */
select option { color: #1f2937 !important; background-color: #ffffff !important; }
select optgroup { color: #1f2937 !important; background-color: #ffffff !important; }
</style>

<script>
/* =====================================================================
   INSP PLANNER — Module IA "M'aider à formuler"
   ---------------------------------------------------------------------
   Script autonome, injecté en fin d'index.html.
   - N'altère pas le bundle React de l'app
   - S'accroche au DOM via MutationObserver
   - Appelle le Cloudflare Worker (clés API stockées côté serveur)

   Endpoints attendus :
     POST {WORKER}/transcribe   multipart {file: audio blob}
                                → { text: "..." }
     POST {WORKER}/reformulate  JSON {transcript, photos[]}
                                → { variants: [
                                     {severity:"douce",    label:"Douce",    text:"..."},
                                     {severity:"standard", label:"Standard", text:"..."},
                                     {severity:"ferme",    label:"Ferme",    text:"..."}
                                   ] }
   ===================================================================== */
(function(){
'use strict';
if (window.INSPK_AI) return;

// ------ Configuration ------
var WORKER_URL    = 'https://insp-planner-api.yvan-nuworzen.workers.dev';
var MAX_PHOTOS    = 4;     // au-delà, on prévient l'utilisateur
var COMPRESS_MAX  = 1024;  // côté max après compression (px)
var COMPRESS_Q    = 0.7;   // qualité JPEG

// ------ État du module ------
var state = {
  selectionMode: false,
  selected: [],       // [{img: <img>, src: "data:image/jpeg..."}]
  recording: false,
  recorder: null,
  chunks: [],
  audioBlob: null,
  transcript: '',
  variants: null,
  busy: false
};

window.INSPK_AI = { reset: resetSelection, _state: state };

// ------ Toast ------
function toast(msg, type){
  if (window.__toast) { window.__toast(msg, type||'ok'); return; }
  var t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText =
    'position:fixed;left:50%;transform:translateX(-50%);bottom:90px;' +
    'background:' + (type==='err' ? '#dc2626' : '#166534') + ';color:#fff;' +
    'padding:10px 18px;border-radius:10px;z-index:99999;' +
    'font:600 13px Inter,system-ui,sans-serif;box-shadow:0 4px 14px rgba(0,0,0,.4)';
  document.body.appendChild(t);
  setTimeout(function(){ t.style.transition='opacity .3s'; t.style.opacity='0'; }, 2000);
  setTimeout(function(){ t.remove(); }, 2400);
}

// ------ Détection de la grille de photos ------
// Critère robuste : un <div> contenant ≥1 <img loading="lazy">
// dont le src démarre par "data:image". On remonte au plus petit
// container "grid" qui les enveloppe.
function findPhotoGrid(){
  var imgs = document.querySelectorAll('img[loading="lazy"]');
  for (var i=0; i<imgs.length; i++){
    var img = imgs[i];
    if (!img.src || img.src.indexOf('data:image') !== 0) continue;
    if (!img.offsetParent) continue;                 // pas visible
    // Le grand-parent direct dans le bundle React est le tile carré
    var tile = img.parentElement;
    if (!tile) continue;
    var grid = tile.parentElement;
    if (!grid) continue;
    // Vérif basique : la grille contient ≥1 tile avec image data:
    var ok = false;
    var tiles = grid.children;
    for (var j=0; j<tiles.length; j++){
      var tImg = tiles[j].querySelector && tiles[j].querySelector('img[loading="lazy"]');
      if (tImg && tImg.src && tImg.src.indexOf('data:image') === 0) { ok = true; break; }
    }
    if (ok) return grid;
  }
  return null;
}

// ------ Bouton "Sélectionner" au-dessus de la grille ------
function ensureSelectButton(grid){
  if (!grid) return;
  // S'il existe déjà au bon endroit, ne rien faire
  if (grid.previousElementSibling && grid.previousElementSibling.dataset && grid.previousElementSibling.dataset.inspkSelect === '1') {
    return;
  }
  var bar = document.createElement('div');
  bar.dataset.inspkSelect = '1';
  bar.style.cssText = 'display:flex;justify-content:flex-end;margin:0 0 6px 0;';
  var btn = document.createElement('button');
  btn.type = 'button';
  btn.textContent = state.selectionMode ? '✕ Annuler' : '☑︎ Sélectionner';
  btn.style.cssText =
    'background:' + (state.selectionMode ? 'rgba(239,68,68,0.15)' : 'rgba(124,58,237,0.15)') + ';' +
    'border:1px solid ' + (state.selectionMode ? 'rgba(239,68,68,0.4)' : 'rgba(124,58,237,0.4)') + ';' +
    'color:' + (state.selectionMode ? '#f87171' : '#c4b5fd') + ';' +
    'border-radius:8px;padding:5px 12px;font:700 11px Inter,system-ui,sans-serif;' +
    'cursor:pointer;letter-spacing:.3px;';
  btn.onclick = function(e){
    e.preventDefault(); e.stopPropagation();
    state.selectionMode = !state.selectionMode;
    if (!state.selectionMode) resetSelection();
    refreshOverlays();
    bar.remove();
    ensureSelectButton(grid);
  };
  bar.appendChild(btn);
  grid.parentNode.insertBefore(bar, grid);
}

// ------ Overlay checkbox sur chaque photo en mode sélection ------
function refreshOverlays(){
  // Retirer tous les overlays existants
  document.querySelectorAll('.inspk-tile-overlay').forEach(function(o){ o.remove(); });
  if (!state.selectionMode) {
    updateFloatingButton();
    return;
  }
  var grid = findPhotoGrid();
  if (!grid) return;
  var tiles = grid.children;
  for (var i=0; i<tiles.length; i++){
    var tile = tiles[i];
    var img = tile.querySelector('img[loading="lazy"]');
    if (!img || !img.src || img.src.indexOf('data:image') !== 0) continue;
    addCheckbox(tile, img);
  }
  updateFloatingButton();
}

function addCheckbox(tile, img){
  // Empêcher l'overlay plein écran original
  if (!tile.dataset.inspkPatched){
    tile.addEventListener('click', captureClickIfSelectMode, true);
    tile.dataset.inspkPatched = '1';
  }
  var ov = document.createElement('div');
  ov.className = 'inspk-tile-overlay';
  ov.style.cssText =
    'position:absolute;inset:0;border-radius:8px;cursor:pointer;' +
    'background:rgba(0,0,0,0.25);display:flex;align-items:flex-start;justify-content:flex-end;padding:6px;';
  var checked = isSelected(img.src);
  var box = document.createElement('div');
  box.style.cssText =
    'width:24px;height:24px;border-radius:50%;border:2px solid #fff;' +
    'background:' + (checked ? '#7c3aed' : 'rgba(0,0,0,0.4)') + ';' +
    'display:flex;align-items:center;justify-content:center;' +
    'color:#fff;font:700 14px Inter,system-ui,sans-serif;' +
    'box-shadow:0 2px 6px rgba(0,0,0,0.5);';
  box.textContent = checked ? '✓' : '';
  ov.appendChild(box);
  // S'assurer que le tile a position:relative (déjà le cas dans le bundle)
  if (getComputedStyle(tile).position === 'static') tile.style.position = 'relative';
  tile.appendChild(ov);
}

function captureClickIfSelectMode(e){
  if (!state.selectionMode) return;
  e.preventDefault();
  e.stopPropagation();
  var tile = e.currentTarget;
  var img = tile.querySelector('img[loading="lazy"]');
  if (!img) return;
  toggleSelection(img);
  refreshOverlays();
}

function isSelected(src){
  for (var i=0; i<state.selected.length; i++){
    if (state.selected[i].src === src) return true;
  }
  return false;
}
function toggleSelection(img){
  var src = img.src;
  for (var i=0; i<state.selected.length; i++){
    if (state.selected[i].src === src) {
      state.selected.splice(i,1);
      return;
    }
  }
  if (state.selected.length >= MAX_PHOTOS) {
    toast('Max ' + MAX_PHOTOS + ' photos', 'err');
    return;
  }
  state.selected.push({ img: img, src: src });
}

function resetSelection(){
  state.selected = [];
  state.selectionMode = false;
  refreshOverlays();
  document.querySelectorAll('[data-inspk-select="1"]').forEach(function(b){ b.remove(); });
}

  state.recorder = null;
  state.chunks = [];
  state.audioBlob = null;
  state.transcript = '';

function escapeHtml(s){
  return String(s||'').replace(/[&<>"']/g, function(c){
    return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
  });
}
function escapeAttr(s){ return escapeHtml(s); }

// Affiche une erreur visible DANS la modale (le toast est masqué par la modale)
function showError(msg, detail){
  var z = document.getElementById('inspk-variants-zone');
  if (!z) { toast(msg, 'err'); return; }
  z.innerHTML =
    '<div style="background:rgba(239,68,68,0.10);border:1px solid rgba(239,68,68,0.5);border-radius:10px;padding:12px;margin-top:8px">' +
      '<div style="color:#f87171;font-weight:700;font-size:12px;margin-bottom:6px">⚠ ' + escapeHtml(msg) + '</div>' +
      (detail ? '<div style="color:#a5b8d0;font-size:10px;font-family:var(--font-mono),monospace;word-break:break-all;background:#0d0f12;padding:8px;border-radius:6px;max-height:160px;overflow:auto;white-space:pre-wrap">' + escapeHtml(detail) + '</div>' : '') +
    '</div>';
}

function copyToClipboard(text){
  if (!text) return;
  var done = function(){ toast('✓ Copié', 'ok'); if (navigator.vibrate) navigator.vibrate(20); };
  if (navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(text).then(done, function(){ fallbackCopy(text, done); });
  } else {
    fallbackCopy(text, done);
  }
}

      category: document.getElementById('inspk-savecat-cat').value,
      createdAt: new Date().toISOString(),
      timesUsed: 0
    };
    if (!entry.text) { toast('Phrase vide', 'err'); return; }
    var cur = [];
    try { var _l = localStorage.getItem('ispk-catalog'); if (_l) cur = JSON.parse(_l) || []; } catch(_){}
    if (!Array.isArray(cur)) cur = [];
    cur.unshift(entry);
    try { localStorage.setItem('ispk-catalog', JSON.stringify(cur)); } catch(_){}
    try { window.__inspk_catalog = cur; } catch(_){}
    if (typeof window.__inspk_refresh_catalog === 'function') {
      try { window.__inspk_refresh_catalog(cur); } catch(_){}
    }
    document.body.removeChild(ov);
    toast('✓ Ajoutée au catalogue', 'ok');
    if (navigator.vibrate) navigator.vibrate(20);
  };
}
function fallbackCopy(text, done){
  var ta = document.createElement('textarea');
  ta.value = text; ta.style.position='fixed'; ta.style.opacity='0';
  document.body.appendChild(ta); ta.select();
  try { document.execCommand('copy'); done(); } catch(e){ toast('Copie échouée', 'err'); }
  ta.remove();
}

// ------ Enregistrement audio ------
function startRecording(){
  if (state.recording) return;
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia){
    toast('Micro non supporté', 'err'); return;
  }
  navigator.mediaDevices.getUserMedia({ audio: true }).then(function(stream){
    state.chunks = [];
    var mime = '';
    if (window.MediaRecorder){
      var candidates = ['audio/mp4','audio/webm;codecs=opus','audio/webm','audio/ogg'];
      for (var i=0; i<candidates.length; i++){
        if (MediaRecorder.isTypeSupported && MediaRecorder.isTypeSupported(candidates[i])) { mime = candidates[i]; break; }
      }
    }
    try {
      state.recorder = mime ? new MediaRecorder(stream, { mimeType: mime })
                            : new MediaRecorder(stream);
    } catch(e){
      toast('Erreur micro', 'err');
      stream.getTracks().forEach(function(t){ t.stop(); });
      return;
    }
    state.recorder.ondataavailable = function(e){ if (e.data && e.data.size) state.chunks.push(e.data); };
    state.recorder.onstop = function(){
      stream.getTracks().forEach(function(t){ t.stop(); });
      state.audioBlob = new Blob(state.chunks, { type: state.recorder.mimeType || 'audio/mp4' });
      state.recording = false;
      renderRecZone();
      runTranscribe();
    };
    state.recorder.start();
    state.recording = true;
    renderRecZone();
    if (navigator.vibrate) navigator.vibrate(15);
  }).catch(function(err){
    var msg = (err && err.name === 'NotAllowedError') ? 'Micro refusé. Active dans Réglages > Safari' : 'Micro indisponible';
    toast(msg, 'err');
  });
}
function stopRecording(){
  if (!state.recording || !state.recorder) return;
  try { state.recorder.stop(); } catch(e){}
}

// ------ Compression photo ------
function compressPhoto(dataUrl){
  return new Promise(function(resolve){
    var img = new Image();
    img.onload = function(){
      var w = img.width, h = img.height;
      if (w > COMPRESS_MAX || h > COMPRESS_MAX){
        if (w > h){ h = Math.round(h * COMPRESS_MAX / w); w = COMPRESS_MAX; }
        else      { w = Math.round(w * COMPRESS_MAX / h); h = COMPRESS_MAX; }
      }
      var c = document.createElement('canvas');
      c.width = w; c.height = h;
      c.getContext('2d').drawImage(img, 0, 0, w, h);
      try { resolve(c.toDataURL('image/jpeg', COMPRESS_Q)); }
      catch(e){ resolve(dataUrl); }
    };
    img.onerror = function(){ resolve(dataUrl); };
    img.src = dataUrl;
  });
}

// ------ Appels Worker ------
function runTranscribe(){
  if (!state.audioBlob) return;
  state.busy = 'transcribing';
  renderTranscriptZone();
  var fd = new FormData();
  var ext = (state.audioBlob.type.indexOf('mp4')>=0) ? 'mp4'
          : (state.audioBlob.type.indexOf('webm')>=0) ? 'webm'
          : (state.audioBlob.type.indexOf('ogg')>=0)  ? 'ogg'
          : 'm4a';
  fd.append('file', state.audioBlob, 'note.' + ext);
  console.log('[INSPK_AI] /transcribe →', { type: state.audioBlob.type, size: state.audioBlob.size });
  fetch(WORKER_URL + '/transcribe', { method:'POST', body: fd })
    .then(function(r){
      console.log('[INSPK_AI] /transcribe status:', r.status);
      return r.text().then(function(txt){
        if (!r.ok) throw new Error('HTTP ' + r.status + ' — ' + txt.slice(0,300));
        try { return JSON.parse(txt); } catch(e){ throw new Error('Réponse non-JSON: ' + txt.slice(0,200)); }
      });
    })
    .then(function(j){
      console.log('[INSPK_AI] /transcribe response:', j);
      state.transcript = (j && (j.text || j.transcription)) || '';
      state.busy = false;
      renderTranscriptZone();
      if (!state.transcript) showError('Transcription vide', JSON.stringify(j).slice(0,300));
    })
    .catch(function(err){
      console.error('[INSPK_AI] /transcribe error:', err);
      state.busy = false;
      renderTranscriptZone();
      showError('Erreur transcription', err.message);
    });
}

function runReformulate(){
  if (!state.transcript) return;
  state.busy = 'reformulating';
  renderTranscriptZone();
  renderVariantsZone();

  Promise.all(state.selected.map(function(p){ return compressPhoto(p.src); }))
    .then(function(compressed){
      var __ctx_site = (typeof window!=="undefined" && window.__inspk_active_site) || null;
      var __ctx_cat = (typeof window!=="undefined" && Array.isArray(window.__inspk_catalog)) ? window.__inspk_catalog : [];
      var payload = { 
        transcript: state.transcript, 
        photos: compressed,
        commissionYear: __ctx_site ? (__ctx_site.commissionYear || null) : null,
        standard: __ctx_site ? (__ctx_site.standard || "") : "",
        catalogExtensions: __ctx_cat
      };
      console.log('[INSPK_AI] /reformulate →', {
        transcript: state.transcript,
        photoCount: compressed.length,
        approxKB: Math.round(JSON.stringify(payload).length / 1024)
      });
      return fetch(WORKER_URL + '/reformulate', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(payload)
      });
    })
    .then(function(r){
      console.log('[INSPK_AI] /reformulate status:', r.status);
      return r.text().then(function(txt){
        if (!r.ok) throw new Error('HTTP ' + r.status + ' — ' + txt.slice(0,500));
        try { return JSON.parse(txt); } catch(e){ throw new Error('Réponse non-JSON: ' + txt.slice(0,300)); }
      });
    })
    .then(function(j){
      console.log('[INSPK_AI] /reformulate response:', j);
      state.busy = false;
      renderTranscriptZone();
      var v = (j && j.variants) || null;
      if (!v && j && j.suggestions) v = j.suggestions;
      if (!Array.isArray(v) || !v.length) {
        showError('Réponse inattendue du Worker (pas de variants[])', JSON.stringify(j, null, 2).slice(0,500));
        return;
      }
      state.variants = v;
      renderVariantsZone();
    })
    .catch(function(err){
      console.error('[INSPK_AI] /reformulate error:', err);
      state.busy = false;
      renderTranscriptZone();
      showError('Erreur reformulation', err.message);
    });
}

// ------ Boucle d'observation du DOM ------
// Quand l'utilisateur ouvre/ferme la fiche site, la grille apparaît/disparaît.
// On ré-injecte le bouton "Sélectionner" et les overlays selon besoin.
var pollTimer = null;
function tick(){
  var grid = findPhotoGrid();
  if (grid) {
    ensureSelectButton(grid);
    if (state.selectionMode) {
      // Re-poser les overlays s'ils ont été retirés par un re-render
      var hasOverlay = grid.querySelector('.inspk-tile-overlay');
      if (!hasOverlay) refreshOverlays();
    }
  } else {
    // Plus de grille visible : on remet à zéro la sélection et on retire le FAB
    if (state.selected.length || state.selectionMode){
      resetSelection();
    }
  }
}
function startObserver(){
  if (pollTimer) return;
  // Observer + tick périodique (React peut re-rendre rapidement)
  var mo = new MutationObserver(function(){ tick(); });
  mo.observe(document.body, { childList: true, subtree: true });
  pollTimer = setInterval(tick, 800);
  tick();
}

if (document.readyState === 'loading') {
  document.addEventListener('DOMContentLoaded', startObserver);
} else {
  startObserver();
}

})();

</script>



<script>
/* =====================================================================
   INSP PLANNER — Module À FAIRE (v2 - défensif)
   ===================================================================== */
(function(){
'use strict';
if (window.INSPK_TODO) return;

// =========================== Stockage ===========================
var LS_KEY = 'ispk-todos';

function loadTodos(){
  try{
    var raw = localStorage.getItem(LS_KEY);
    if(!raw) return [];
    var a = JSON.parse(raw);

  }catch(e){ return []; }
}
function saveTodos(arr){
  try{
    localStorage.setItem(LS_KEY, JSON.stringify(arr));
    localStorage.setItem('ispk-todos-mtime', String(Date.now()));
  }catch(e){}
  // Déclencher le push cloud (debounce 1s pour éviter trop de pushes)
  try{
    if(window.__inspkTodoPushTimer) clearTimeout(window.__inspkTodoPushTimer);
    window.__inspkTodoPushTimer = setTimeout(function(){
      try{
        if(typeof window.__inspk_push_cloud === 'function'){
          window.__inspk_push_cloud();
        }
      }catch(_){}
    }, 1000);
  }catch(_){}
}

var todos = loadTodos();

// =========================== Helpers temps ===========================
function pad2(n){ return n<10?'0'+n:''+n; }
function parseISODate(s){
  if(!s) return null;
  var d = new Date(s);
  if(isNaN(d.getTime())) return null;
  return d;
}
function isoWeekNumber(d){
  var target = new Date(d.valueOf());
  var dayNr = (d.getDay()+6)%7;
  target.setDate(target.getDate()-dayNr+3);
  var firstThursday = target.valueOf();
  target.setMonth(0,1);
  if(target.getDay()!==4){
    target.setMonth(0, 1+((4-target.getDay())+7)%7);
  }
  return 1 + Math.ceil((firstThursday - target)/(7*24*3600*1000));
}
function isoWeekYear(d){
  var target = new Date(d.valueOf());
  var dayNr = (d.getDay()+6)%7;
  target.setDate(target.getDate()-dayNr+3);
  return target.getFullYear();
}
function fridayOfWeek(year, week){
  var simple = new Date(year, 0, 1 + (week-1)*7);
  var dow = simple.getDay();
  var ISOweekStart = simple;
  if(dow<=4) ISOweekStart.setDate(simple.getDate()-simple.getDay()+1);
  else ISOweekStart.setDate(simple.getDate()+8-simple.getDay());
  var fri = new Date(ISOweekStart);
  fri.setDate(ISOweekStart.getDate()+4);
  return fri;
}
function formatDateFull(d){
  if(!d) return '';
  return pad2(d.getDate())+'/'+pad2(d.getMonth()+1)+'/'+d.getFullYear();
}
function startOfDay(d){
  var x = new Date(d);
  x.setHours(0,0,0,0);
  return x;
}
function daysBetween(a, b){
  var ma = startOfDay(a).getTime();
  var mb = startOfDay(b).getTime();
  return Math.round((mb-ma)/(24*3600*1000));
}

// =========================== État de retard ===========================
function lateState(todo, now){
  if(!todo.due) return {label:'', color:'', blink:false, urgent:false};
  var dueDate = parseISODate(todo.due);
  if(!dueDate) return {label:'', color:'', blink:false, urgent:false};

  if(todo.kind === 'timesheet'){
    return timesheetState(todo, now);
  }
  if(todo.kind === 'q1report'){
    return q1ReportState(todo, now);
  }

  var diff = daysBetween(now, dueDate);
  if(diff > 1) return {label:'', color:'', blink:false, urgent:false};
  if(diff === 1) return {label:'Demain', color:'#f59e0b', blink:false, urgent:false};
  if(diff === 0) return {label:"Aujourd'hui", color:'#f59e0b', blink:false, urgent:true};
  if(diff === -1) return {label:'En retard (J+1)', color:'#ef4444', blink:false, urgent:true};
  return {label:'En retard (J'+diff+')', color:'#ef4444', blink:true, urgent:true};
}

function q1ReportState(todo, now){
  // todo.visitDate = date de la visite
  // Étape ① (admin) : à faire dès J+8
  // - J+8 à J+14 : orange
  // - J+15 à J+20 : rouge clignotant
  // - J+21+ : ⛔ rouge clignotant (urgent pour tenir J+30)
  // Étape ② (client) : 
  // - Si ① fait + ② pas fait + J+25+ : rappel bleu clignotant
  var visitDate = parseISODate(todo.visitDate);
  if(!visitDate) return {label:'', color:'', blink:false, urgent:false};
  var dSinceVisit = daysBetween(visitDate, now);
  
  var adminDone = false, clientDone = false;
  for(var i=0;i<(todo.subtasks||[]).length;i++){
    if(todo.subtasks[i].id === 'admin') adminDone = todo.subtasks[i].done;
    if(todo.subtasks[i].id === 'client') clientDone = todo.subtasks[i].done;
  }
  
  // Étape ① pas faite
  if(!adminDone){
    if(dSinceVisit < 8) return {label:'', color:'', blink:false, urgent:false};
    if(dSinceVisit <= 14) return {label:'À transmettre admin', color:'#f59e0b', blink:false, urgent:true};
    if(dSinceVisit <= 20) return {label:'Retard admin (J+'+dSinceVisit+')', color:'#ef4444', blink:true, urgent:true};
    return {label:'⛔ URGENT admin (J+'+dSinceVisit+')', color:'#ef4444', blink:true, urgent:true, critical:true};
  }
  
  // Étape ① faite, étape ② pas faite
  if(!clientDone){
    if(dSinceVisit < 25) return {label:'Admin OK — attente client', color:'#3b82f6', blink:false, urgent:false};
    if(dSinceVisit < 30) return {label:'Vérifier envoi client (J+'+dSinceVisit+')', color:'#3b82f6', blink:true, urgent:true};
    return {label:'⛔ Envoi client en retard (J+'+dSinceVisit+')', color:'#ef4444', blink:true, urgent:true, critical:true};
  }
  
  return {label:'', color:'', blink:false, urgent:false};
}

function timesheetState(todo, now){
  var dueDate = parseISODate(todo.due);
  if(!dueDate) return {label:'', color:'', blink:false};
  var diff = daysBetween(dueDate, now);
  if(diff < 0) return {label:'À venir', color:'', blink:false};
  if(diff === 0) return {label:'Vendredi', color:'', blink:false};
  if(diff === 1) return {label:'Samedi', color:'#f59e0b', blink:false, urgent:true};
  if(diff === 2) return {label:'Dimanche', color:'#ef4444', blink:false, urgent:true};
  return {label:'En retard (lundi+)', color:'#ef4444', blink:true, urgent:true};
}

function activeCount(){
  var c = 0;
  for(var i=0;i<todos.length;i++) if(!todos[i].done) c++;
  return c;
}
function hasUrgent(){
  var now = new Date();
  for(var i=0;i<todos.length;i++){
    if(todos[i].done) continue;
    if(lateState(todos[i], now).urgent) return true;
  }
  return false;
}
function hasBlinking(){
  var now = new Date();
  for(var i=0;i<todos.length;i++){
    if(todos[i].done) continue;
    if(lateState(todos[i], now).blink) return true;
  }
  return false;
}

// =========================== Génération auto FH ===========================
// Plancher : aucune feuille d'heures antérieure à cette semaine n'est générée
// (évite que S14-S19 reviennent à chaque nouvelle version).
var TS_FLOOR_YEAR = 2026;
var TS_FLOOR_WEEK = 20;
function tsBeforeFloor(year, week){
  if(year < TS_FLOOR_YEAR) return true;
  if(year === TS_FLOOR_YEAR && week < TS_FLOOR_WEEK) return true;
  return false;
}
function ensureTimesheets(){
  try{
    var now = new Date();
    var toCheck = [{year: isoWeekYear(now), week: isoWeekNumber(now)}];
    for(var k=1; k<=6; k++){
      var past = new Date(now);
      past.setDate(now.getDate() - 7*k);
      toCheck.push({year: isoWeekYear(past), week: isoWeekNumber(past)});
    }
    var changed = false;
    // Purge des feuilles d'heures antérieures au plancher (one-shot à chaque chargement)
    for(var p=todos.length-1; p>=0; p--){
      var td = todos[p];
      if(td && td.kind === 'timesheet'){
        var mw = /^ts-(\d+)-W(\d+)$/.exec(td.id || '');
        if(mw && tsBeforeFloor(parseInt(mw[1],10), parseInt(mw[2],10))){
          todos.splice(p,1);
          changed = true;
        }
      }
    }
    for(var i=0;i<toCheck.length;i++){
      var wk = toCheck[i];
      if(tsBeforeFloor(wk.year, wk.week)) continue;
      var fri = fridayOfWeek(wk.year, wk.week);
      if(daysBetween(fri, now) < 0) continue;
      var id = 'ts-'+wk.year+'-W'+pad2(wk.week);
      var exists = false;
      for(var j=0;j<todos.length;j++){
        if(todos[j].id === id){ exists = true; break; }
      }
      if(!exists){
        todos.unshift({
          id: id,
          kind: 'timesheet',
          title: "Feuille d'heures S"+pad2(wk.week),
          description: "Semaine "+wk.week+" — "+wk.year,
          due: fri.getFullYear()+'-'+pad2(fri.getMonth()+1)+'-'+pad2(fri.getDate()),
          recurrence: 'weekly',
          subtasks: [
            {id:'smax', label:'Smax', done:false},
            {id:'excel', label:'Excel', done:false}
          ],
          done: false,
          createdAt: new Date().toISOString(),
          protected: true
        });
        changed = true;
      }
    }
    if(changed) saveTodos(todos);
  }catch(e){}
}

// =========================== API publique ===========================
function computeNextDue(currentDue, recurrence){
  var d = parseISODate(currentDue) || new Date();
  if(recurrence === 'daily') d.setDate(d.getDate()+1);
  else if(recurrence === 'weekly') d.setDate(d.getDate()+7);
  else if(recurrence === 'monthly') d.setMonth(d.getMonth()+1);
  else if(recurrence === 'yearly') d.setFullYear(d.getFullYear()+1);
  else return '';
  return d.getFullYear()+'-'+pad2(d.getMonth()+1)+'-'+pad2(d.getDate());
}

window.INSPK_TODO = {
  getAll: function(){ return todos.slice(); },
  add: function(t){
    var n = {
      id: 't-'+Date.now()+'-'+Math.random().toString(36).slice(2,7),
      kind: 'note',
      title: t.title||'',
      description: t.description||'',
      due: t.due||'',
      recurrence: t.recurrence||'none',
      subtasks: t.subtasks||[],
      done: false,
      createdAt: new Date().toISOString()
    };
    todos.unshift(n);
    saveTodos(todos);
    refresh();
    return n;
  },
  update: function(id, patch){
    for(var i=0;i<todos.length;i++){
      if(todos[i].id===id){
        var merged = {};
        for(var k in todos[i]) merged[k] = todos[i][k];
        for(var k2 in patch) merged[k2] = patch[k2];
        todos[i] = merged;
        break;
      }
    }
    saveTodos(todos);
    refresh();
  },
  remove: function(id){
    var nt = [];
    for(var i=0;i<todos.length;i++){
      if(todos[i].id!==id) nt.push(todos[i]);
    }
    todos = nt;
    saveTodos(todos);
    refresh();
  },
  toggle: function(id){
    for(var i=0;i<todos.length;i++){
      if(todos[i].id===id){
        var t = todos[i];
        var nowDone = !t.done;
        var merged = {};
        for(var k in t) merged[k] = t[k];
        merged.done = nowDone;
        merged.doneAt = nowDone ? new Date().toISOString() : null;
        todos[i] = merged;
        if(nowDone && t.recurrence && t.recurrence!=='none' && t.kind!=='timesheet'){
          var nextDue = computeNextDue(t.due, t.recurrence);
          if(nextDue){
            var subs = [];
            for(var s=0;s<(t.subtasks||[]).length;s++){
              subs.push({id:t.subtasks[s].id, label:t.subtasks[s].label, done:false});
            }
            todos.unshift({
              id: 't-'+Date.now()+'-'+Math.random().toString(36).slice(2,7),
              kind: t.kind,
              title: t.title,
              description: t.description,
              due: nextDue,
              recurrence: t.recurrence,
              subtasks: subs,
              done: false,
              createdAt: new Date().toISOString()
            });
          }
        }
        break;
      }
    }
    saveTodos(todos);
    refresh();
  },
  toggleSubtask: function(id, subId){
    for(var i=0;i<todos.length;i++){
      if(todos[i].id===id){
        var t = todos[i];
        var subs = [];
        var allDone = true;
        for(var j=0;j<(t.subtasks||[]).length;j++){
          var sub = t.subtasks[j];
          if(sub.id===subId){
            sub = {id:sub.id, label:sub.label, done:!sub.done, doneAt: !sub.done ? new Date().toISOString() : null};
          }
          if(!sub.done) allDone = false;
          subs.push(sub);
        }
        if(!subs.length) allDone = false;
        var merged = {};
        for(var k in t) merged[k] = t[k];
        merged.subtasks = subs;
        // Auto-complétion UNIQUEMENT pour les feuilles d'heures et rapports Q1
        // (toutes les sous-tâches sont obligatoires)
        // Pour les notes normales, l'utilisateur doit cocher la case principale lui-même
        if(t.kind === 'timesheet' || t.kind === 'q1report'){
          merged.done = allDone;
          merged.doneAt = allDone ? new Date().toISOString() : null;
        }
        todos[i] = merged;
        break;
      }
    }
    saveTodos(todos);
    refresh();
  }
};

// =========================== Rendu UI ===========================
var currentFilter = 'pending';
var editingId = null;
var creating = false;
var selectionMode = false; // mode sélection multiple (sur Terminées)
var selectedIds = {}; // {id: true}

// =========================== Génération Q1 (rapports d'intervention) ===========================
// Lit les sites depuis localStorage ispk-all et génère des items "Rapport Q1"
// pour les visites passées sans rapport envoyé.
// Bornes: 8 jours après visite = apparition (étape ①), 25 jours = rappel étape ②
// Date de coupure: on ne crée pas d'items pour visites avant l'installation du module
var Q1_INSTALL_KEY = 'ispk-q1-install-date';
function getQ1InstallDate(){
  try{
    var d = localStorage.getItem(Q1_INSTALL_KEY);
    if(d) return new Date(d);
    // Premier lancement : borne = aujourd'hui (les visites antérieures ne génèrent pas d'items)
    var now = new Date();

    return now;
  }catch(_){ return new Date(); }
}
function loadSites(){

}
function isVisitWithReportNeeded(site){
  // Pour l'instant: toutes les visites donnent lieu à un rapport
  // L'utilisateur peut désactiver via "Rapport non requis" sur l'item lui-même
  return true;

function ensureQ1Items(){
  try{
    var installDate = getQ1InstallDate();
    var now = new Date();
    var sites = loadSites();
    var changed = false;
    
    for(var si=0; si<sites.length; si++){
      var site = sites[si];
      if(!site || !site.visits || !site.visits.length) continue;
      if(!isVisitWithReportNeeded(site)) continue;
      
      for(var vi=0; vi<site.visits.length; vi++){
        var visitStr = site.visits[vi];
        var visitDate = parseISODate(visitStr);
        if(!visitDate) continue;
        
        // Borne basse: ne pas créer pour visites avant installation
        if(visitDate.getTime() < installDate.getTime()) continue;
        
        // Borne haute: visite future = pas encore d'item
        if(daysBetween(visitDate, now) < 8) continue;
        
        var itemId = 'q1-'+site.id+'-'+visitStr;
        var existing = null;
        for(var ti=0; ti<todos.length; ti++){
          if(todos[ti].id === itemId){ existing = todos[ti]; break; }
        }
        
        if(!existing){
          // Calculer due date = visite + 30 jours (limite légale R1)
          var dueDate = new Date(visitDate);
          dueDate.setDate(visitDate.getDate() + 30);
          
          todos.unshift({
            id: itemId,
            kind: 'q1report',
            title: 'Rapport Q1 — '+siteDisplayName(site),
            description: 'Visite du '+formatDateFull(visitDate),
            due: dueDate.getFullYear()+'-'+pad2(dueDate.getMonth()+1)+'-'+pad2(dueDate.getDate()),
            visitDate: visitStr,
            siteId: site.id,
            recurrence: 'none',
            subtasks: [
              {id:'admin', label:'① Transmis au service administratif', done:false},
              {id:'client', label:'② Envoyé au client', done:false}
            ],
            done: false,
            createdAt: new Date().toISOString(),
            protected: true
          });
          changed = true;
        }
      }
    }
    
    if(changed) saveTodos(todos);
  }catch(e){ if(window.console) console.warn('[INSPK_TODO] ensureQ1 error:', e); }
}

function el(tag, attrs, children){
  var n = document.createElement(tag);
  if(attrs){
    for(var k in attrs){
      var v = attrs[k];
      if(v == null) continue;
      if(k === 'style' && typeof v === 'object'){
        for(var sk in v) n.style[sk] = v[sk];
      } else if(k === 'class' || k === 'className'){
        n.className = v;
      } else if(k.slice(0,2) === 'on' && typeof v === 'function'){
        n.addEventListener(k.slice(2).toLowerCase(), v);
      } else if(k === 'html'){
        n.innerHTML = v;
      } else {
        try{ n.setAttribute(k, v); }catch(e){}
      }
    }
  }
  if(children){
    for(var i=0;i<children.length;i++){
      var c = children[i];
      if(c == null || c === false) continue;
      if(typeof c === 'string' || typeof c === 'number'){
        n.appendChild(document.createTextNode(String(c)));
      } else {
        n.appendChild(c);
      }
    }
  }
  return n;
}

function getFilteredTodos(){
  var now = new Date();
  var startOfToday = startOfDay(now);
  var endOfWeek = new Date(startOfToday);
  endOfWeek.setDate(startOfToday.getDate() + (7 - ((now.getDay()+6)%7)));
  
  var out = [];
  for(var i=0;i<todos.length;i++){
    var t = todos[i];
    var keep = false;
    if(currentFilter === 'all') keep = true;
    else if(currentFilter === 'done') keep = !!t.done;
    else if(currentFilter === 'pending') keep = !t.done;
    else if(currentFilter === 'late'){
      if(!t.done && lateState(t, now).urgent) keep = true;
    }
    else if(currentFilter === 'today'){
      if(!t.done && t.due){
        var d = parseISODate(t.due);
        if(d && startOfDay(d).getTime() === startOfToday.getTime()) keep = true;
      }
    }
    else if(currentFilter === 'week'){
      if(!t.done && t.due){
        var d2 = parseISODate(t.due);
        if(d2 && d2.getTime() >= startOfToday.getTime() && d2.getTime() <= endOfWeek.getTime()) keep = true;
      }
    }
    if(keep) out.push(t);
  }
  
  out.sort(function(a, b){
    if(a.done !== b.done) return a.done ? 1 : -1;
    var sA = lateState(a, now), sB = lateState(b, now);
    if(sA.urgent !== sB.urgent) return sA.urgent ? -1 : 1;
    var da = a.due ? parseISODate(a.due) : null;
    var db = b.due ? parseISODate(b.due) : null;
    if(da && !db) return -1;
    if(!da && db) return 1;
    if(da && db) return da.getTime() - db.getTime();
    return (b.createdAt||'').localeCompare(a.createdAt||'');
  });
  return out;
}

    onclick: function(){
      if(isSelectable){
        if(selectedIds[t.id]) delete selectedIds[t.id];
        else selectedIds[t.id] = true;
        refresh();
        try{ if(window.__hap) window.__hap(); }catch(_){}
        return;
      }
      if(isTimesheet) return;
      editingId = t.id;
      creating = false;
      refresh();
    }
  }, [
    el('div', {style:{display:'flex', alignItems:'flex-start', gap:'10px'}}, [
      checkbox,
      el('div', {style:{flex:1, minWidth:0}}, [
        el('div', {style:{display:'flex', alignItems:'center', gap:'6px', flexWrap:'wrap'}}, [
          el('span', {
            style:{
              fontSize:'13px', fontWeight:'600',
              color: t.done ? 'var(--text3)' : 'var(--text)',
              textDecoration: t.done ? 'line-through' : 'none'
            }
          }, [t.title]),
          stateBadge,
          isQ1 && !isRejected && !t.done && daysSinceVisit != null ? el('span', {
            style:{
              fontSize:'10px', fontWeight:'700',
              padding:'2px 7px',
              borderRadius:'4px',
              background:'var(--bg-input)',
              color:'var(--text2)',
              border:'1px solid var(--border)',
              fontFamily:'var(--font-mono)',
              whiteSpace:'nowrap'
            }
          }, ['J+' + daysSinceVisit]) : null,
          isQ1 && isRejected ? el('span', {
            style:{
              fontSize:'9px', color:'var(--text3)',
              fontFamily:'var(--font-mono)',
              background:'rgba(107,114,128,0.15)', padding:'1px 6px',
              borderRadius:'4px', border:'1px solid var(--border)'
            }
          }, ['❌ Pas de rapport']) : null,
          isTimesheet ? el('span', {
            style:{
              fontSize:'9px', color:'var(--text3)',
              fontFamily:'var(--font-mono)',
              background:'var(--bg-input)', padding:'1px 6px',
              borderRadius:'4px', border:'1px solid var(--border)'
            }
          }, ['🔁 hebdo']) : null
        ]),
        t.description ? el('div', {
          style:{
            fontSize:'11px', color:'var(--text2)',
            marginTop:'3px', whiteSpace:'pre-wrap'
          }
        }, [t.description]) : null,
        dueDate ? el('div', {
          style:{fontSize:'10px', color:'var(--text3)', marginTop:'3px', fontFamily:'var(--font-mono)'}
        }, ['📅 ' + formatDateFull(dueDate)]) : null
      ]),
      deleteBtn
    ]),
    subtasksRender,
    (isQ1 && !isRejected && !t.done && !isSelectable) ? el('div', {
      style:{
        marginTop:'8px', paddingTop:'8px',
        borderTop:'1px dashed var(--border)',
        display:'flex', justifyContent:'flex-end'
      }
    }, [
      el('button', {
        style:{
          background:'transparent',
          border:'1px solid var(--border)',
          color:'var(--text3)',
          borderRadius:'6px',
          padding:'4px 10px',
          fontSize:'10px',
          fontFamily:'inherit',
          fontWeight:'600',
          cursor:'pointer'
        },
        onclick: function(e){
          e.stopPropagation();
          if(!confirm('Marquer "Pas de rapport pour cette visite" ?\n\nL\'item sera classé dans Terminées (récupérable).')) return;
          window.INSPK_TODO.update(t.id, {rejected: true, done: true, doneAt: new Date().toISOString()});
        }
      }, ['❌ Pas de rapport pour cette visite'])
    ]) : null
  ]);
}

function buildEmptyState(){
  var icon = currentFilter === 'done' ? '✅' : currentFilter === 'late' ? '🎉' : '📝';
  var msg = currentFilter === 'done' ? 'Aucune tâche terminée'
    : currentFilter === 'late' ? 'Rien en retard, bravo !'
    : currentFilter === 'today' ? "Rien pour aujourd'hui"
    : currentFilter === 'week' ? 'Rien cette semaine'
    : 'Aucune note pour le moment';
  
  var children = [
    el('div', {style:{fontSize:'32px', marginBottom:'10px'}}, [icon]),
    el('div', {style:{fontSize:'13px', marginBottom:'6px', color:'var(--text2)'}}, [msg])
  ];
  if(currentFilter !== 'done' && currentFilter !== 'late'){
    children.push(el('div', {style:{fontSize:'11px'}}, ['Appuie sur "+ Nouvelle note" pour commencer']));
  }
  return el('div', {style:{textAlign:'center', padding:'48px 16px', color:'var(--text3)'}}, children);
}

function refresh(){
  try{
    var root = document.getElementById('insp-todo-root');
    if(!root) return;
    
    root.innerHTML = '';
    root.appendChild(buildHeader());
    
    if(creating){
      root.appendChild(buildEditor(null));
    }
    if(editingId){
      var editTodo = null;
      for(var i=0;i<todos.length;i++) if(todos[i].id === editingId){ editTodo = todos[i]; break; }
      if(editTodo){
        root.appendChild(buildEditor(editTodo));
      }
    }
    
    var list = getFilteredTodos();
    if(list.length === 0){
      root.appendChild(buildEmptyState());
    } else {
      var listContainer = el('div', {}, []);
      for(var j=0; j<list.length; j++){
        if(list[j].id === editingId) continue;
        listContainer.appendChild(buildTodoCard(list[j]));
      }
      root.appendChild(listContainer);
    }
  }catch(e){
    if(window.console) console.error('[INSPK_TODO] refresh error:', e);
  }
  
  try{ updateBadge(); }catch(_){}
  try{ updateHomeBanner(); }catch(_){}
  try{ updateAppBadge(); }catch(_){}
}

// =========================== Badge sur l'onglet ===========================
var todoBtnRef = null;

function findTodoBtn(){
  if(todoBtnRef && todoBtnRef.parentNode) return todoBtnRef;
  try{
    var btns = document.querySelectorAll('button');
    for(var i=0;i<btns.length;i++){
      var b = btns[i];
      // Le bouton "À FAIRE" est dans la barre de tabs (4ème de la barre)
      // Son texte natif est "À FAIRE" (avec span badge possible)
      var txt = '';
      // Récupérer le premier text node
      for(var j=0;j<b.childNodes.length;j++){
        if(b.childNodes[j].nodeType === 3){
          txt = b.childNodes[j].textContent.trim();
          break;
        }
      }
      if(txt === 'À FAIRE'){
        todoBtnRef = b;
        return b;
      }
    }
  }catch(e){}
  return null;
}

function updateBadge(){
  try{
    var btn = findTodoBtn();
    if(!btn) return;
    
    var count = activeCount();
    var urgent = hasUrgent();
    var blink = hasBlinking();
    
    // État cible signature pour idempotence
    var sig = count + '|' + (urgent?'u':'') + '|' + (blink?'b':'');
    if(btn._inspkBadgeSig === sig) return;
    btn._inspkBadgeSig = sig;
    
    var oldBadge = btn.querySelector('.inspk-todo-badge');
    if(oldBadge) oldBadge.remove();
    
    if(count === 0) return;
    
    var badge = document.createElement('span');
    badge.className = 'inspk-todo-badge' + (blink ? ' inspk-blink' : '');
    badge.style.cssText = [
      'display:inline-flex',
      'align-items:center',
      'justify-content:center',
      'min-width:16px',
      'height:16px',
      'padding:0 5px',
      'margin-left:4px',
      'border-radius:' + (blink ? '3px' : '999px'),
      'background:' + (urgent ? '#ef4444' : '#3b82f6'),
      'color:#fff',
      'font-size:9px',
      'font-weight:700',
      'transform:' + (blink ? 'rotate(45deg)' : 'none'),
      'vertical-align:middle',
      'box-shadow:' + (urgent ? '0 0 8px rgba(239,68,68,0.5)' : '0 1px 3px rgba(0,0,0,0.3)')
    ].join(';');
    
    if(blink){
      var inner = document.createElement('span');
      inner.textContent = String(count);
      inner.style.cssText = 'transform:rotate(-45deg);display:inline-block;';
      badge.appendChild(inner);
    } else {
      badge.textContent = String(count);
    }
    
    btn.appendChild(badge);
  }catch(e){}
}

// =========================== Banniere ACCUEIL Q1 ===========================
// Scanne les rapports Q1 non termines et renvoie l'etat agrege pour la banniere
function q1BannerState(){
  var now = new Date();
  var retard = 0, afaire = 0;
  for(var i=0;i<todos.length;i++){
    var t = todos[i];
    if(!t || t.done) continue;
    if(t.kind !== 'q1report') continue;
    var st = q1ReportState(t, now);
    if(!st || !st.color) continue;
    if(st.color === '#ef4444'){ retard++; }
    else if(st.color === '#f59e0b' || (st.color === '#3b82f6' && st.urgent)){ afaire++; }
  }
  if(retard === 0 && afaire === 0) return {show:false};
  var level = retard > 0 ? 'retard' : 'afaire';
  var msg;
  if(retard > 0){
    msg = retard + ' rapport' + (retard>1?'s':'') + ' Q1 en retard';
    if(afaire > 0) msg += ' \u00B7 ' + afaire + ' \u00E0 traiter';
  } else {
    msg = afaire + ' rapport' + (afaire>1?'s':'') + ' Q1 \u00E0 transmettre';
  }
  return {show:true, level:level, retard:retard, afaire:afaire, msg:msg};
}

// Repere le bloc d'en-tete "Tableau de bord" du tab ACCUEIL
function findHomeHeader(){
  try{
    var divs = document.querySelectorAll('.tab-content-enter div');
    for(var i=0;i<divs.length;i++){
      var d = divs[i];
      if(d.childNodes.length === 1 && d.firstChild && d.firstChild.nodeType === 3
         && d.firstChild.textContent.trim() === 'Tableau de bord'){
        return d.parentNode;
      }
    }
  }catch(_){}
  return null;
}

// Injecte / met a jour / retire la banniere de rappel Q1 sur le tableau de bord
function updateHomeBanner(){
  try{
    var header = findHomeHeader();
    var existing = document.getElementById('inspk-q1-banner');
    if(!header){
      if(existing) existing.remove();
      return;
    }
    var state = q1BannerState();
    if(!state.show){
      if(existing) existing.remove();
      return;
    }
    var isRetard = state.level === 'retard';
    var sig = state.level + '|' + state.msg;
    if(existing && existing._inspkSig === sig) return;
    if(existing) existing.remove();

    var banner = document.createElement('div');
    banner.id = 'inspk-q1-banner';
    banner._inspkSig = sig;
    banner.setAttribute('role','button');
    banner.className = isRetard ? 'inspk-blink' : '';
    var col = isRetard ? '#ef4444' : '#f59e0b';
    var bg  = isRetard ? 'rgba(239,68,68,0.12)' : 'rgba(245,158,11,0.12)';
    var bd  = isRetard ? 'rgba(239,68,68,0.45)' : 'rgba(245,158,11,0.45)';
    banner.style.cssText = [
      'display:flex','align-items:center','gap:9px',
      'margin:0 2px 14px','padding:9px 11px',
      'background:'+bg,'border:1px solid '+bd,
      'border-left:3px solid '+col,'border-radius:8px',
      'cursor:pointer','-webkit-tap-highlight-color:transparent'
    ].join(';');

    var icon = document.createElement('span');
    icon.textContent = isRetard ? '\u26A0\uFE0F' : '\uD83D\uDD14';
    icon.style.cssText = 'font-size:15px;flex-shrink:0;line-height:1;';

    var txt = document.createElement('span');
    txt.textContent = state.msg;
    txt.style.cssText = 'flex:1;font-size:12px;font-weight:600;color:'+col+';line-height:1.3;';

    var chev = document.createElement('span');
    chev.textContent = 'Voir \u203A';
    chev.style.cssText = 'font-size:11px;font-weight:700;color:'+col+';opacity:0.8;flex-shrink:0;';

    banner.appendChild(icon);
    banner.appendChild(txt);
    banner.appendChild(chev);
    banner.addEventListener('click', function(){
      try{ var b = findTodoBtn(); if(b) b.click(); }catch(_){}
    });

    header.parentNode.insertBefore(banner, header.nextSibling);
  }catch(_){}
}

// =========================== Badge sur l'icone (PWA) ===========================
// API Badging : fonctionne sur PWA installee (iOS 16.4+ via ecran d'accueil,
// Chrome/Edge desktop). Ignore silencieusement si non supporte.
function updateAppBadge(){
  try{
    if(!('setAppBadge' in navigator)) return;
    var count = activeCount();
    if(count > 0){
      navigator.setAppBadge(count).catch(function(){});
    } else {
      navigator.clearAppBadge().catch(function(){});
    }
  }catch(_){}
}

// =========================== CSS injection ===========================
function injectCSS(){
  if(document.getElementById('inspk-todo-css')) return;
  var st = document.createElement('style');
  st.id = 'inspk-todo-css';
  st.textContent = '@keyframes inspk-blink-pulse{0%,100%{opacity:1}50%{opacity:0.35}}.inspk-blink{animation:inspk-blink-pulse 0.9s ease-in-out infinite}';
  if(document.head) document.head.appendChild(st);
  else if(document.body) document.body.appendChild(st);
}

// =========================== Init différé ===========================
// Stratégie : attendre que React ait fini de monter, puis observer SEULEMENT
// le container #insp-todo-root via polling léger
var initDone = false;
var rootCheckTimer = null;

function maybeRender(){
  try{
    var rootEl = document.getElementById('insp-todo-root');
    if(rootEl && rootEl.childNodes.length === 0){
      refresh();
    } else {
      updateBadge();
    }
    updateHomeBanner();
    updateAppBadge();
  }catch(e){}
}

function startPolling(){
  if(initDone) return;
  initDone = true;
  try{ injectCSS(); }catch(_){}
  try{ ensureTimesheets(); }catch(_){}
  try{ ensureQ1Items(); }catch(_){}
  
  // Écouter les pulls cloud pour recharger les todos depuis localStorage
  try{
    window.addEventListener('inspk-todos-pulled', function(){
      try{
        todos = loadTodos();
        if(document.getElementById('insp-todo-root')){ refresh(); }
        else { updateBadge(); }
        updateHomeBanner();
        updateAppBadge();
      }catch(_){}
    });
  }catch(_){}
  
  // Polling léger toutes les 1.5s (cherche le container et met à jour badge)
  setInterval(function(){
    maybeRender();
  }, 1500);
  
  // Auto-régénération FH + Q1 toutes les 5 minutes
  setInterval(function(){
    try{ ensureTimesheets(); }catch(_){}
    try{ ensureQ1Items(); }catch(_){}
  }, 300000);
  
  // Rafraîchissement rapide de la bannière ACCUEIL (DOM léger)
  setInterval(function(){
    try{ updateHomeBanner(); }catch(_){}
  }, 600);
  
  // Premier check
  maybeRender();
}

function waitForReact(){
  // Attendre que React ait monté son arbre (loading display=none + root populated)
  var attempts = 0;
  var t = setInterval(function(){
    attempts++;
    var loading = document.getElementById('loading');
    var root = document.getElementById('root');
    if(loading && loading.style.display === 'none' && root && root.firstChild){
      clearInterval(t);
      // Petit délai supplémentaire pour laisser React se stabiliser
      setTimeout(startPolling, 300);
    } else if(attempts > 100){ // > 20s timeout
      clearInterval(t);
      // Démarrer quand même
      startPolling();
    }
  }, 200);
}

if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', waitForReact);
} else {
  waitForReact();
}

})();
</script>
